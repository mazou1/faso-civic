# Configuration du sélecteur « New issue » de GitHub.
# Les issues vierges sont désactivées : on passe par un gabarit (bug, source
# cassée, proposition de source) pour garder les signalements structurés.
blank_issues_enabled: false
# Porte de sortie « autre sujet / question » → onglet Discussions du dépôt.
# (Nécessite que Discussions soit activé : Settings → Features → Discussions.)
contact_links:
  - name: Question ou autre sujet
    url: https://github.com/mazou1/faso-reperes/discussions
    about: Pour une question, une idée à débattre ou un sujet hors gabarit.
